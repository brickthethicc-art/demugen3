# Nginx configuration for Mugen multiplayer game
# Place this in /etc/nginx/sites-available/mugen and symlink to sites-enabled

# Upstream for the game server (WebSocket support)
upstream mugen_backend {
    server 127.0.0.1:3001;
}

# Upstream for the frontend (if serving built files)
upstream mugen_frontend {
    server 127.0.0.1:5173;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL certificate paths (use Let's Encrypt or your provider)
    ssl_certificate /etc/ssl/certs/mugen.crt;
    ssl_certificate_key /etc/ssl/private/mugen.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client body size limit (for large payloads if needed)
    client_max_body_size 10M;

    # WebSocket proxy configuration
    location /socket.io/ {
        proxy_pass http://mugen_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout settings
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://mugen_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Frontend static files (if serving built Vite app)
    location / {
        proxy_pass http://mugen_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Alternatively, serve static files directly
    # location / {
    #     root /var/www/mugen/dist;
    #     try_files $uri $uri/ /index.html;
    # }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
